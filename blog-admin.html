<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; }
    
    .admin-container { display: flex; min-height: 100vh; }
    
    /* 侧边栏 */
    .sidebar { width: 220px; background: #2c3e50; color: #fff; padding: 20px; }
    .sidebar h1 { font-size: 18px; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #34495e; }
    .sidebar nav ul { list-style: none; }
    .sidebar nav li { margin-bottom: 8px; }
    .sidebar nav a { color: #bdc3c7; text-decoration: none; display: block; padding: 10px 15px; border-radius: 4px; transition: background 0.3s; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #34495e; color: #fff; }
    
    /* 主内容区 */
    .main-content { flex: 1; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header h2 { font-size: 24px; color: #2c3e50; }
    .header .user-info { color: #7f8c8d; }
    
    /* 卡片样式 */
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    .card-title { font-size: 16px; font-weight: 600; color: #2c3e50; }
    
    /* 按钮 */
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: opacity 0.3s; }
    .btn-primary { background: #3498db; color: #fff; }
    .btn-success { background: #2ecc71; color: #fff; }
    .btn-warning { background: #f39c12; color: #fff; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn:hover { opacity: 0.9; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    
    /* 表格 */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; color: #2c3e50; }
    tr:hover { background: #f8f9fa; }
    
    /* 表单 */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #2c3e50; }
    .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .form-control:focus { outline: none; border-color: #3498db; }
    textarea.form-control { min-height: 100px; }
    
    /* 统计卡片 */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .stat-card .number { font-size: 32px; font-weight: 700; color: #2c3e50; }
    .stat-card .label { color: #7f8c8d; margin-top: 5px; }
    .stat-card.blue { border-left: 4px solid #3498db; }
    .stat-card.green { border-left: 4px solid #2ecc71; }
    .stat-card.orange { border-left: 4px solid #f39c12; }
    .stat-card.red { border-left: 4px solid #e74c3c; }
    
    /* 模态框 */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: #fff; border-radius: 8px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 18px; }
    .modal-header .close { cursor: pointer; font-size: 24px; color: #999; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; text-align: right; }
    
    /* 状态标签 */
    .status { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .status.draft { background: #f0f0f0; color: #666; }
    .status.published { background: #d4edda; color: #155724; }
    .status.pending { background: #fff3cd; color: #856404; }
    .status.approved { background: #d4edda; color: #155724; }
    .status.rejected { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <h1>📝 博客管理</h1>
      <nav>
        <ul>
          <li><a href="#dashboard" class="active" onclick="showSection('dashboard')">仪表盘</a></li>
          <li><a href="#posts" onclick="showSection('posts')">文章管理</a></li>
          <li><a href="#categories" onclick="showSection('categories')">分类管理</a></li>
          <li><a href="#tags" onclick="showSection('tags')">标签管理</a></li>
          <li><a href="#comments" onclick="showSection('comments')">评论管理</a></li>
          <li><a href="#links" onclick="showSection('links')">友情链接</a></li>
          <li><a href="#settings" onclick="showSection('settings')">系统设置</a></li>
        </ul>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <div class="header">
        <h2 id="pageTitle">仪表盘</h2>
        <div class="user-info">管理员 · 欢迎回来</div>
      </div>

      <!-- 仪表盘 -->
      <div id="dashboard" class="section">
        <div class="stats-grid">
          <div class="stat-card blue">
            <div class="number" id="statPosts">5</div>
            <div class="label">文章总数</div>
          </div>
          <div class="stat-card green">
            <div class="number" id="statComments">3</div>
            <div class="label">评论总数</div>
          </div>
          <div class="stat-card orange">
            <div class="number" id="statViews">5.5k</div>
            <div class="label">总访问量</div>
          </div>
          <div class="stat-card red">
            <div class="number" id="statPending">1</div>
            <div class="label">待审核评论</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">最近文章</div>
            <button class="btn btn-primary" onclick="showPostForm()">+ 新建文章</button>
          </div>
          <table>
            <thead>
              <tr><th>标题</th><th>状态</th><th>分类</th><th>发布时间</th><th>操作</th></tr>
            </thead>
            <tbody id="recentPosts">
            </tbody>
          </table>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">待审核评论</div>
          </div>
          <table>
            <thead>
              <tr><th>文章</th><th>作者</th><th>内容</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody id="pendingComments">
            </tbody>
          </table>
        </div>
      </div>

      <!-- 文章管理 -->
      <div id="posts" class="section" style="display: none;">
        <div class="card">
          <div class="card-header">
            <div class="card-title">文章列表</div>
            <button class="btn btn-primary" onclick="showPostForm()">+ 新建文章</button>
          </div>
          <table>
            <thead>
              <tr><th>标题</th><th>状态</th><th>分类</th><th>阅读量</th><th>评论数</th><th>发布时间</th><th>操作</th></tr>
            </thead>
            <tbody id="postsTable">
            </tbody>
          </table>
        </div>
      </div>

      <!-- 分类管理 -->
      <div id="categories" class="section" style="display: none;">
        <div class="card">
          <div class="card-header">
            <div class="card-title">分类列表</div>
            <button class="btn btn-primary" onclick="showCategoryForm()">+ 新建分类</button>
          </div>
          <table>
            <thead>
              <tr><th>名称</th><th>别名</th><th>文章数</th><th>状态</th><th>排序</th><th>操作</th></tr>
            </thead>
            <tbody id="categoriesTable">
            </tbody>
          </table>
        </div>
      </div>

      <!-- 标签管理 -->
      <div id="tags" class="section" style="display: none;">
        <div class="card">
          <div class="card-header">
            <div class="card-title">标签列表</div>
            <button class="btn btn-primary" onclick="showTagForm()">+ 新建标签</button>
          </div>
          <table>
            <thead>
              <tr><th>名称</th><th>别名</th><th>文章数</th><th>操作</th></tr>
            </thead>
            <tbody id="tagsTable">
            </tbody>
          </table>
        </div>
      </div>

      <!-- 评论管理 -->
      <div id="comments" class="section" style="display: none;">
        <div class="card">
          <div class="card-header">
            <div class="card-title">评论列表</div>
          </div>
          <table>
            <thead>
              <tr><th>文章</th><th>作者</th><th>内容</th><th>状态</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody id="commentsTable">
            </tbody>
          </table>
        </div>
      </div>

      <!-- 友情链接 -->
      <div id="links" class="section" style="display: none;">
        <div class="card">
          <div class="card-header">
            <div class="card-title">友情链接</div>
            <button class="btn btn-primary" onclick="showLinkForm()">+ 新建链接</button>
          </div>
          <table>
            <thead>
              <tr><th>名称</th><th>URL</th><th>状态</th><th>排序</th><th>操作</th></tr>
            </thead>
            <tbody id="linksTable">
            </tbody>
          </table>
        </div>
      </div>

      <!-- 系统设置 -->
      <div id="settings" class="section" style="display: none;">
        <div class="card">
          <div class="card-header">
            <div class="card-title">系统设置</div>
          </div>
          <form id="settingsForm">
            <div class="form-group">
              <label>网站标题</label>
              <input type="text" class="form-control" id="settingTitle" value="AIGC 博客">
            </div>
            <div class="form-group">
              <label>网站副标题</label>
              <input type="text" class="form-control" id="settingSubtitle" value="分享技术与思考">
            </div>
            <div class="form-group">
              <label>站点描述</label>
              <textarea class="form-control" id="settingDescription">这是一个使用 AIGC 技术构建的现代化博客系统。</textarea>
            </div>
            <div class="form-group">
              <label>每页文章数</label>
              <input type="number" class="form-control" id="settingPostsPerPage" value="10">
            </div>
            <button type="button" class="btn btn-primary" onclick="saveSettings()">保存设置</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- 文章编辑模态框 -->
  <div id="postModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="postModalTitle">新建文章</h3>
        <span class="close" onclick="closeModal('postModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="postForm">
          <input type="hidden" id="postId">
          <div class="form-group">
            <label>标题</label>
            <input type="text" class="form-control" id="postTitle" placeholder="请输入文章标题">
          </div>
          <div class="form-group">
            <label>别名</label>
            <input type="text" class="form-control" id="postSlug" placeholder="URL 别名">
          </div>
          <div class="form-group">
            <label>摘要</label>
            <textarea class="form-control" id="postExcerpt" placeholder="文章摘要"></textarea>
          </div>
          <div class="form-group">
            <label>内容</label>
            <textarea class="form-control" id="postContent" placeholder="文章内容（支持 Markdown）"></textarea>
          </div>
          <div class="form-group">
            <label>分类</label>
            <select class="form-control" id="postCategory">
              <option value="">请选择分类</option>
            </select>
          </div>
          <div class="form-group">
            <label>标签</label>
            <input type="text" class="form-control" id="postTags" placeholder="多个标签用逗号分隔">
          </div>
          <div class="form-group">
            <label>状态</label>
            <select class="form-control" id="postStatus">
              <option value="DRAFT">草稿</option>
              <option value="PUBLISHED">已发布</option>
            </select>
          </div>
          <div class="form-group">
            <label>可见性</label>
            <select class="form-control" id="postVisibility">
              <option value="PUBLIC">公开</option>
              <option value="PRIVATE">私有</option>
            </select>
          </div>
          <div class="form-group">
            <label><input type="checkbox" id="postIsSticky"> 置顶文章</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('postModal')">取消</button>
        <button class="btn btn-primary" onclick="savePost()">保存</button>
      </div>
    </div>
  </div>

  <!-- 分类编辑模态框 -->
  <div id="categoryModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="categoryModalTitle">新建分类</h3>
        <span class="close" onclick="closeModal('categoryModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="categoryForm">
          <input type="hidden" id="categoryId">
          <div class="form-group">
            <label>名称</label>
            <input type="text" class="form-control" id="categoryName" placeholder="分类名称">
          </div>
          <div class="form-group">
            <label>别名</label>
            <input type="text" class="form-control" id="categorySlug" placeholder="URL 别名">
          </div>
          <div class="form-group">
            <label>描述</label>
            <textarea class="form-control" id="categoryDesc" placeholder="分类描述"></textarea>
          </div>
          <div class="form-group">
            <label>排序</label>
            <input type="number" class="form-control" id="categorySortOrder" value="0">
          </div>
          <div class="form-group">
            <label><input type="checkbox" id="categoryIsActive" checked> 启用</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('categoryModal')">取消</button>
        <button class="btn btn-primary" onclick="saveCategory()">保存</button>
      </div>
    </div>
  </div>

  <!-- 标签编辑模态框 -->
  <div id="tagModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="tagModalTitle">新建标签</h3>
        <span class="close" onclick="closeModal('tagModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="tagForm">
          <input type="hidden" id="tagId">
          <div class="form-group">
            <label>名称</label>
            <input type="text" class="form-control" id="tagName" placeholder="标签名称">
          </div>
          <div class="form-group">
            <label>别名</label>
            <input type="text" class="form-control" id="tagSlug" placeholder="URL 别名">
          </div>
          <div class="form-group">
            <label>描述</label>
            <textarea class="form-control" id="tagDesc" placeholder="标签描述"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('tagModal')">取消</button>
        <button class="btn btn-primary" onclick="saveTag()">保存</button>
      </div>
    </div>
  </div>

  <!-- 链接编辑模态框 -->
  <div id="linkModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="linkModalTitle">新建友情链接</h3>
        <span class="close" onclick="closeModal('linkModal')">&times;</span>
      </div>
      <div class="modal-body">
        <form id="linkForm">
          <input type="hidden" id="linkId">
          <div class="form-group">
            <label>名称</label>
            <input type="text" class="form-control" id="linkName" placeholder="链接名称">
          </div>
          <div class="form-group">
            <label>URL</label>
            <input type="text" class="form-control" id="linkUrl" placeholder="链接地址">
          </div>
          <div class="form-group">
            <label>描述</label>
            <textarea class="form-control" id="linkDesc" placeholder="链接描述"></textarea>
          </div>
          <div class="form-group">
            <label>排序</label>
            <input type="number" class="form-control" id="linkSortOrder" value="0">
          </div>
          <div class="form-group">
            <label><input type="checkbox" id="linkIsActive" checked> 启用</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('linkModal')">取消</button>
        <button class="btn btn-primary" onclick="saveLink()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // Mock 数据
    const mockPosts = [
      { id: 1, title: '深入理解 TypeScript 类型系统', slug: 'typescript-types', status: 'PUBLISHED', visibility: 'PUBLIC', categoryId: 1, categoryName: '前端开发', viewCount: 1234, likeCount: 89, commentCount: 23, isSticky: true, createdAt: '2024-01-15' },
      { id: 2, title: 'React 18 新特性详解', slug: 'react-18-features', status: 'PUBLISHED', visibility: 'PUBLIC', categoryId: 1, categoryName: '前端开发', viewCount: 856, likeCount: 67, commentCount: 15, isSticky: false, createdAt: '2024-01-10' },
      { id: 3, title: 'Node.js 性能优化技巧', slug: 'nodejs-performance', status: 'DRAFT', visibility: 'PRIVATE', categoryId: 2, categoryName: '后端开发', viewCount: 0, likeCount: 0, commentCount: 0, isSticky: false, createdAt: '2024-01-08' },
      { id: 4, title: 'Docker 容器化实践', slug: 'docker-practice', status: 'PUBLISHED', visibility: 'PUBLIC', categoryId: 3, categoryName: 'DevOps', viewCount: 456, likeCount: 34, commentCount: 12, isSticky: false, createdAt: '2024-01-05' },
      { id: 5, title: 'AI 大模型应用入门', slug: 'ai-llm-intro', status: 'PUBLISHED', visibility: 'PUBLIC', categoryId: 4, categoryName: '人工智能', viewCount: 2345, likeCount: 156, commentCount: 45, isSticky: true, createdAt: '2024-01-01' },
    ];

    const mockCategories = [
      { id: 1, name: '前端开发', slug: 'frontend', description: '前端技术相关文章', postCount: 2, isActive: true, sortOrder: 1 },
      { id: 2, name: '后端开发', slug: 'backend', description: '后端技术相关文章', postCount: 1, isActive: true, sortOrder: 2 },
      { id: 3, name: 'DevOps', slug: 'devops', description: 'DevOps 与运维相关', postCount: 1, isActive: true, sortOrder: 3 },
      { id: 4, name: '人工智能', slug: 'ai', description: 'AI 与机器学习', postCount: 1, isActive: true, sortOrder: 4 },
    ];

    const mockTags = [
      { id: 1, name: 'TypeScript', slug: 'typescript', description: 'TypeScript 语言', postCount: 1 },
      { id: 2, name: '前端', slug: 'frontend', description: '前端开发', postCount: 2 },
      { id: 3, name: 'React', slug: 'react', description: 'React 框架', postCount: 1 },
      { id: 4, name: 'Node.js', slug: 'nodejs', description: 'Node.js 开发', postCount: 1 },
      { id: 5, name: 'Docker', slug: 'docker', description: 'Docker 容器', postCount: 1 },
      { id: 6, name: 'DevOps', slug: 'devops', description: 'DevOps 实践', postCount: 1 },
      { id: 7, name: 'AI', slug: 'ai', description: '人工智能', postCount: 1 },
      { id: 8, name: 'LLM', slug: 'llm', description: '大语言模型', postCount: 1 },
    ];

    const mockComments = [
      { id: 1, postId: 1, postTitle: '深入理解 TypeScript 类型系统', authorName: '张三', content: '写得很好，受益匪浅！', status: 'APPROVED', createdAt: '2024-01-16' },
      { id: 2, postId: 1, postTitle: '深入理解 TypeScript 类型系统', authorName: '李四', content: '学习了，期待更多干货！', status: 'PENDING', createdAt: '2024-01-17' },
      { id: 3, postId: 5, postTitle: 'AI 大模型应用入门', authorName: '王五', content: 'AI 时代来了！', status: 'APPROVED', createdAt: '2024-01-02' },
    ];

    const mockLinks = [
      { id: 1, name: 'GitHub', url: 'https://github.com', description: '代码托管平台', isActive: true, sortOrder: 1 },
      { id: 2, name: '掘金', url: 'https://juejin.cn', description: '技术社区', isActive: true, sortOrder: 2 },
      { id: 3, name: 'SegmentFault', url: 'https://segmentfault.com', description: '思否', isActive: false, sortOrder: 3 },
      { id: 4, name: 'CSDN', url: 'https://csdn.net', description: '专业IT社区', isActive: true, sortOrder: 4 },
    ];

    // 显示指定区域
    function showSection(sectionId) {
      document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
      document.getElementById(sectionId).style.display = 'block';
      document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
      document.querySelector(`.sidebar nav a[href="#${sectionId}"]`).classList.add('active');
      
      const titles = {
        dashboard: '仪表盘',
        posts: '文章管理',
        categories: '分类管理',
        tags: '标签管理',
        comments: '评论管理',
        links: '友情链接',
        settings: '系统设置'
      };
      document.getElementById('pageTitle').textContent = titles[sectionId];
      
      // 刷新数据
      if (sectionId === 'dashboard') renderDashboard();
      else if (sectionId === 'posts') renderPosts();
      else if (sectionId === 'categories') renderCategories();
      else if (sectionId === 'tags') renderTags();
      else if (sectionId === 'comments') renderComments();
      else if (sectionId === 'links') renderLinks();
    }

    // 渲染仪表盘
    function renderDashboard() {
      document.getElementById('recentPosts').innerHTML = mockPosts.slice(0, 3).map(post => `
        <tr>
          <td>${post.title}</td>
          <td><span class="status ${post.status.toLowerCase()}">${post.status === 'PUBLISHED' ? '已发布' : '草稿'}</span></td>
          <td>${post.categoryName}</td>
          <td>${post.createdAt}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editPost(${post.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deletePost(${post.id})">删除</button>
          </td>
        </tr>
      `).join('');

      const pendingComments = mockComments.filter(c => c.status === 'PENDING');
      document.getElementById('pendingComments').innerHTML = pendingComments.map(comment => `
        <tr>
          <td>${comment.postTitle}</td>
          <td>${comment.authorName}</td>
          <td>${comment.content.slice(0, 30)}${comment.content.length > 30 ? '...' : ''}</td>
          <td>${comment.createdAt}</td>
          <td>
            <button class="btn btn-sm btn-success" onclick="approveComment(${comment.id})">通过</button>
            <button class="btn btn-sm btn-danger" onclick="rejectComment(${comment.id})">拒绝</button>
          </td>
        </tr>
      `).join('');
    }

    // 渲染文章列表
    function renderPosts() {
      document.getElementById('postsTable').innerHTML = mockPosts.map(post => `
        <tr>
          <td>${post.isSticky ? '📌 ' : ''}${post.title}</td>
          <td><span class="status ${post.status.toLowerCase()}">${post.status === 'PUBLISHED' ? '已发布' : '草稿'}</span></td>
          <td>${post.categoryName}</td>
          <td>${post.viewCount}</td>
          <td>${post.commentCount}</td>
          <td>${post.createdAt}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editPost(${post.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deletePost(${post.id})">删除</button>
          </td>
        </tr>
      `).join('');
    }

    // 渲染分类列表
    function renderCategories() {
      document.getElementById('categoriesTable').innerHTML = mockCategories.map(cat => `
        <tr>
          <td>${cat.name}</td>
          <td>${cat.slug}</td>
          <td>${cat.postCount}</td>
          <td><span class="status ${cat.isActive ? 'approved' : 'rejected'}">${cat.isActive ? '启用' : '禁用'}</span></td>
          <td>${cat.sortOrder}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editCategory(${cat.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteCategory(${cat.id})">删除</button>
          </td>
        </tr>
      `).join('');
    }

    // 渲染标签列表
    function renderTags() {
      document.getElementById('tagsTable').innerHTML = mockTags.map(tag => `
        <tr>
          <td>${tag.name}</td>
          <td>${tag.slug}</td>
          <td>${tag.postCount}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editTag(${tag.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteTag(${tag.id})">删除</button>
          </td>
        </tr>
      `).join('');
    }

    // 渲染评论列表
    function renderComments() {
      document.getElementById('commentsTable').innerHTML = mockComments.map(comment => `
        <tr>
          <td>${comment.postTitle}</td>
          <td>${comment.authorName}</td>
          <td>${comment.content.slice(0, 30)}${comment.content.length > 30 ? '...' : ''}</td>
          <td><span class="status ${comment.status.toLowerCase()}">${comment.status === 'APPROVED' ? '已通过' : comment.status === 'PENDING' ? '待审核' : '已拒绝'}</span></td>
          <td>${comment.createdAt}</td>
          <td>
            ${comment.status === 'PENDING' ? `
              <button class="btn btn-sm btn-success" onclick="approveComment(${comment.id})">通过</button>
              <button class="btn btn-sm btn-danger" onclick="rejectComment(${comment.id})">拒绝</button>
            ` : ''}
            <button class="btn btn-sm btn-danger" onclick="deleteComment(${comment.id})">删除</button>
          </td>
        </tr>
      `).join('');
    }

    // 渲染链接列表
    function renderLinks() {
      document.getElementById('linksTable').innerHTML = mockLinks.map(link => `
        <tr>
          <td>${link.name}</td>
          <td><a href="${link.url}" target="_blank">${link.url}</a></td>
          <td><span class="status ${link.isActive ? 'approved' : 'rejected'}">${link.isActive ? '启用' : '禁用'}</span></td>
          <td>${link.sortOrder}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editLink(${link.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteLink(${link.id})">删除</button>
          </td>
        </tr>
      `).join('');
    }

    // 显示文章表单
    function showPostForm(postId = null) {
      const modal = document.getElementById('postModal');
      const title = document.getElementById('postModalTitle');
      
      if (postId) {
        const post = mockPosts.find(p => p.id === postId);
        if (post) {
          title.textContent = '编辑文章';
          document.getElementById('postId').value = post.id;
          document.getElementById('postTitle').value = post.title;
          document.getElementById('postSlug').value = post.slug;
          document.getElementById('postCategory').value = post.categoryId;
          document.getElementById('postStatus').value = post.status;
          document.getElementById('postVisibility').value = post.visibility;
          document.getElementById('postIsSticky').checked = post.isSticky;
        }
      } else {
        title.textContent = '新建文章';
        document.getElementById('postForm').reset();
        document.getElementById('postId').value = '';
      }
      
      loadCategoriesForSelect();
      modal.classList.add('show');
    }

    // 加载分类到下拉框
    function loadCategoriesForSelect() {
      const select = document.getElementById('postCategory');
      select.innerHTML = '<option value="">请选择分类</option>' + 
        mockCategories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
    }

    // 保存文章
    function savePost() {
      const id = document.getElementById('postId').value;
      const data = {
        title: document.getElementById('postTitle').value,
        slug: document.getElementById('postSlug').value,
        excerpt: document.getElementById('postExcerpt').value,
        content: document.getElementById('postContent').value,
        categoryId: parseInt(document.getElementById('postCategory').value) || undefined,
        status: document.getElementById('postStatus').value,
        visibility: document.getElementById('postVisibility').value,
        isSticky: document.getElementById('postIsSticky').checked,
      };
      
      if (!data.title) {
        alert('请输入文章标题');
        return;
      }
      
      if (id) {
        const index = mockPosts.findIndex(p => p.id === parseInt(id));
        if (index !== -1) {
          mockPosts[index] = { ...mockPosts[index], ...data, id: parseInt(id) };
        }
      } else {
        const newId = Math.max(...mockPosts.map(p => p.id)) + 1;
        mockPosts.push({ ...data, id: newId, viewCount: 0, likeCount: 0, commentCount: 0, createdAt: new Date().toISOString().split('T')[0] });
      }
      
      closeModal('postModal');
      alert('保存成功！');
      if (document.getElementById('posts').style.display === 'block') renderPosts();
      else if (document.getElementById('dashboard').style.display === 'block') renderDashboard();
    }

    // 编辑文章
    function editPost(id) {
      showPostForm(id);
    }

    // 删除文章
    function deletePost(id) {
      if (confirm('确定要删除这篇文章吗？')) {
        const index = mockPosts.findIndex(p => p.id === id);
        if (index !== -1) {
          mockPosts.splice(index, 1);
          alert('删除成功！');
          if (document.getElementById('posts').style.display === 'block') renderPosts();
          else if (document.getElementById('dashboard').style.display === 'block') renderDashboard();
        }
      }
    }

    // 显示分类表单
    function showCategoryForm(catId = null) {
      const modal = document.getElementById('categoryModal');
      const title = document.getElementById('categoryModalTitle');
      
      if (catId) {
        const cat = mockCategories.find(c => c.id === catId);
        if (cat) {
          title.textContent = '编辑分类';
          document.getElementById('categoryId').value = cat.id;
          document.getElementById('categoryName').value = cat.name;
          document.getElementById('categorySlug').value = cat.slug;
          document.getElementById('categoryDesc').value = cat.description || '';
          document.getElementById('categorySortOrder').value = cat.sortOrder;
          document.getElementById('categoryIsActive').checked = cat.isActive;
        }
      } else {
        title.textContent = '新建分类';
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryId').value = '';
        document.getElementById('categoryIsActive').checked = true;
      }
      
      modal.classList.add('show');
    }

    // 保存分类
    function saveCategory() {
      const id = document.getElementById('categoryId').value;
      const data = {
        name: document.getElementById('categoryName').value,
        slug: document.getElementById('categorySlug').value,
        description: document.getElementById('categoryDesc').value,
        sortOrder: parseInt(document.getElementById('categorySortOrder').value) || 0,
        isActive: document.getElementById('categoryIsActive').checked,
      };
      
      if (!data.name) {
        alert('请输入分类名称');
        return;
      }
      
      if (id) {
        const index = mockCategories.findIndex(c => c.id === parseInt(id));
        if (index !== -1) {
          mockCategories[index] = { ...mockCategories[index], ...data, id: parseInt(id) };
        }
      } else {
        const newId = Math.max(...mockCategories.map(c => c.id)) + 1;
        mockCategories.push({ ...data, id: newId, postCount: 0 });
      }
      
      closeModal('categoryModal');
      alert('保存成功！');
      if (document.getElementById('categories').style.display === 'block') renderCategories();
    }

    // 编辑分类
    function editCategory(id) {
      showCategoryForm(id);
    }

    // 删除分类
    function deleteCategory(id) {
      if (confirm('确定要删除这个分类吗？')) {
        const index = mockCategories.findIndex(c => c.id === id);
        if (index !== -1) {
          mockCategories.splice(index, 1);
          alert('删除成功！');
          renderCategories();
        }
      }
    }

    // 显示标签表单
    function showTagForm(tagId = null) {
      const modal = document.getElementById('tagModal');
      const title = document.getElementById('tagModalTitle');
      
      if (tagId) {
        const tag = mockTags.find(t => t.id === tagId);
        if (tag) {
          title.textContent = '编辑标签';
          document.getElementById('tagId').value = tag.id;
          document.getElementById('tagName').value = tag.name;
          document.getElementById('tagSlug').value = tag.slug;
          document.getElementById('tagDesc').value = tag.description || '';
        }
      } else {
        title.textContent = '新建标签';
        document.getElementById('tagForm').reset();
        document.getElementById('tagId').value = '';
      }
      
      modal.classList.add('show');
    }

    // 保存标签
    function saveTag() {
      const id = document.getElementById('tagId').value;
      const data = {
        name: document.getElementById('tagName').value,
        slug: document.getElementById('tagSlug').value,
        description: document.getElementById('tagDesc').value,
      };
      
      if (!data.name) {
        alert('请输入标签名称');
        return;
      }
      
      if (id) {
        const index = mockTags.findIndex(t => t.id === parseInt(id));
        if (index !== -1) {
          mockTags[index] = { ...mockTags[index], ...data, id: parseInt(id) };
        }
      } else {
        const newId = Math.max(...mockTags.map(t => t.id)) + 1;
        mockTags.push({ ...data, id: newId, postCount: 0 });
      }
      
      closeModal('tagModal');
      alert('保存成功！');
      if (document.getElementById('tags').style.display === 'block') renderTags();
    }

    // 编辑标签
    function editTag(id) {
      showTagForm(id);
    }

    // 删除标签
    function deleteTag(id) {
      if (confirm('确定要删除这个标签吗？')) {
        const index = mockTags.findIndex(t => t.id === id);
        if (index !== -1) {
          mockTags.splice(index, 1);
          alert('删除成功！');
          renderTags();
        }
      }
    }

    // 显示链接表单
    function showLinkForm(linkId = null) {
      const modal = document.getElementById('linkModal');
      const title = document.getElementById('linkModalTitle');
      
      if (linkId) {
        const link = mockLinks.find(l => l.id === linkId);
        if (link) {
          title.textContent = '编辑链接';
          document.getElementById('linkId').value = link.id;
          document.getElementById('linkName').value = link.name;
          document.getElementById('linkUrl').value = link.url;
          document.getElementById('linkDesc').value = link.description || '';
          document.getElementById('linkSortOrder').value = link.sortOrder;
          document.getElementById('linkIsActive').checked = link.isActive;
        }
      } else {
        title.textContent = '新建友情链接';
        document.getElementById('linkForm').reset();
        document.getElementById('linkId').value = '';
        document.getElementById('linkIsActive').checked = true;
      }
      
      modal.classList.add('show');
    }

    // 保存链接
    function saveLink() {
      const id = document.getElementById('linkId').value;
      const data = {
        name: document.getElementById('linkName').value,
        url: document.getElementById('linkUrl').value,
        description: document.getElementById('linkDesc').value,
        sortOrder: parseInt(document.getElementById('linkSortOrder').value) || 0,
        isActive: document.getElementById('linkIsActive').checked,
      };
      
      if (!data.name || !data.url) {
        alert('请填写名称和 URL');
        return;
      }
      
      if (id) {
        const index = mockLinks.findIndex(l => l.id === parseInt(id));
        if (index !== -1) {
          mockLinks[index] = { ...mockLinks[index], ...data, id: parseInt(id) };
        }
      } else {
        const newId = Math.max(...mockLinks.map(l => l.id)) + 1;
        mockLinks.push({ ...data, id: newId });
      }
      
      closeModal('linkModal');
      alert('保存成功！');
      if (document.getElementById('links').style.display === 'block') renderLinks();
    }

    // 编辑链接
    function editLink(id) {
      showLinkForm(id);
    }

    // 删除链接
    function deleteLink(id) {
      if (confirm('确定要删除这个链接吗？')) {
        const index = mockLinks.findIndex(l => l.id === id);
        if (index !== -1) {
          mockLinks.splice(index, 1);
          alert('删除成功！');
          renderLinks();
        }
      }
    }

    // 审核评论
    function approveComment(id) {
      const comment = mockComments.find(c => c.id === id);
      if (comment) {
        comment.status = 'APPROVED';
        alert('审核通过！');
        renderDashboard();
        renderComments();
      }
    }

    // 拒绝评论
    function rejectComment(id) {
      const comment = mockComments.find(c => c.id === id);
      if (comment) {
        comment.status = 'REJECTED';
        alert('已拒绝！');
        renderDashboard();
        renderComments();
      }
    }

    // 删除评论
    function deleteComment(id) {
      if (confirm('确定要删除这条评论吗？')) {
        const index = mockComments.findIndex(c => c.id === id);
        if (index !== -1) {
          mockComments.splice(index, 1);
          alert('删除成功！');
          renderDashboard();
          renderComments();
        }
      }
    }

    // 保存设置
    function saveSettings() {
      alert('设置保存成功！');
    }

    // 关闭模态框
    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('show');
    }

    // 初始化
    renderDashboard();
  </script>
