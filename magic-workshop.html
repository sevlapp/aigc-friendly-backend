<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙‍♂️ 魔法道具工坊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b35, #f7c59f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            color: #aaa;
            font-size: 1.1rem;
        }

        .workshop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 img {
            width: 24px;
            height: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button.primary {
            background: linear-gradient(90deg, #ff6b35, #f7c59f);
            color: #1a1a2e;
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .task-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #ff6b35;
        }

        .task-item:last-child {
            margin-bottom: 0;
        }

        .task-item h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .task-item .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .task-item .meta span {
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status.pending {
            background: #f39c12;
            color: #fff;
        }

        .status.processing {
            background: #3498db;
            color: #fff;
        }

        .status.succeeded {
            background: #27ae60;
            color: #fff;
        }

        .status.failed {
            background: #e74c3c;
            color: #fff;
        }

        .quality {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .quality.common {
            background: #95a5a6;
            color: #fff;
        }

        .quality.rare {
            background: #3498db;
            color: #fff;
        }

        .quality.epic {
            background: #9b59b6;
            color: #fff;
        }

        .quality.legendary {
            background: linear-gradient(90deg, #f1c40f, #e67e22);
            color: #1a1a2e;
        }

        .result-description {
            margin-top: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-style: italic;
            color: #ddd;
        }

        .item-showcase {
            text-align: center;
            padding: 30px;
        }

        .item-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255, 107, 53, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.8)); }
        }

        .item-details {
            margin-top: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #aaa;
        }

        .stat-value {
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ff6b35;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state img {
            width: 80px;
            opacity: 0.5;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧙‍♂️ 魔法道具工坊</h1>
            <p>在这里创造属于你的魔法物品</p>
        </header>

        <div class="workshop-grid">
            <div class="card">
                <h2>📝 创建制作任务</h2>
                <form id="craftForm">
                    <div class="form-group">
                        <label for="itemName">道具名称</label>
                        <input type="text" id="itemName" placeholder="例如：火焰戒指" value="火焰戒指" required>
                    </div>
                    <div class="form-group">
                        <label for="itemType">道具类型</label>
                        <select id="itemType" required>
                            <option value="WEAPON">武器 (WEAPON)</option>
                            <option value="ARMOR">护甲 (ARMOR)</option>
                            <option value="TOOL">工具 (TOOL)</option>
                            <option value="TOY">玩具 (TOY)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="materialLevel">材料等级 (1-5)</label>
                        <input type="range" id="materialLevel" min="1" max="5" value="3" required>
                        <span id="materialLevelValue">3</span> ⭐
                    </div>
                    <div class="form-group">
                        <label for="requestNote">备注（可选）</label>
                        <textarea id="requestNote" placeholder="例如：希望火焰是蓝色的"></textarea>
                    </div>
                    <button type="submit" class="primary">✨ 开始制作</button>
                </form>
            </div>

            <div class="card">
                <h2>📋 任务队列</h2>
                <div id="taskList" class="task-list">
                    <div class="empty-state">
                        <div>📭</div>
                        <p>暂无任务</p>
                        <p style="font-size: 0.8rem;">创建一个任务开始吧！</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>🌟 道具展示</h2>
                <div id="itemShowcase">
                    <div class="empty-state">
                        <div>💎</div>
                        <p>选择一个完成的任务查看道具</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const qualityDescriptions = {
            COMMON: '普通',
            RARE: '精致',
            EPIC: '稀有',
            LEGENDARY: '传说'
        };

        const qualityColors = {
            COMMON: '#95a5a6',
            RARE: '#3498db',
            EPIC: '#9b59b6',
            LEGENDARY: '#f1c40f'
        };

        const typeDescriptions = {
            WEAPON: '武器',
            ARMOR: '护甲',
            TOOL: '工具',
            TOY: '玩具'
        };

        const typeIcons = {
            WEAPON: '⚔️',
            ARMOR: '🛡️',
            TOOL: '🔧',
            TOY: '🎸'
        };

        let tasks = [];
        let taskIdCounter = 1;

        document.getElementById('materialLevel').addEventListener('input', function() {
            document.getElementById('materialLevelValue').textContent = this.value;
        });

        document.getElementById('craftForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const itemName = document.getElementById('itemName').value;
            const itemType = document.getElementById('itemType').value;
            const materialLevel = parseInt(document.getElementById('materialLevel').value);
            const requestNote = document.getElementById('requestNote').value;

            const task = {
                id: taskIdCounter++,
                jobId: `magic-workshop-${Date.now()}`,
                itemName,
                itemType,
                materialLevel,
                requestNote,
                status: 'PENDING',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            tasks.unshift(task);
            renderTaskList();

            simulateProcessing(task);
        });

        async function simulateProcessing(task) {
            await delay(1000);
            task.status = 'PROCESSING';
            task.updatedAt = new Date().toISOString();
            renderTaskList();

            await delay(2000);
            
            const qualityLevel = determineQuality(task.materialLevel);
            const resultDescription = generateDescription(task.itemName, task.itemType, qualityLevel, task.requestNote);

            task.status = 'SUCCEEDED';
            task.qualityLevel = qualityLevel;
            task.resultDescription = resultDescription;
            task.updatedAt = new Date().toISOString();

            renderTaskList();
            showItem(task);
        }

        function determineQuality(materialLevel) {
            const rand = Math.random();
            const thresholds = {
                1: { legendary: 0.01, epic: 0.05, rare: 0.2 },
                2: { legendary: 0.02, epic: 0.1, rare: 0.3 },
                3: { legendary: 0.05, epic: 0.15, rare: 0.4 },
                4: { legendary: 0.1, epic: 0.25, rare: 0.5 },
                5: { legendary: 0.2, epic: 0.4, rare: 0.6 }
            };

            const t = thresholds[materialLevel];
            if (rand < t.legendary) return 'LEGENDARY';
            if (rand < t.epic) return 'EPIC';
            if (rand < t.rare) return 'RARE';
            return 'COMMON';
        }

        function generateDescription(itemName, itemType, qualityLevel, requestNote) {
            const qualityAdjectives = {
                COMMON: '普通的',
                RARE: '精致的',
                EPIC: '稀有的',
                LEGENDARY: '传说中的'
            };

            const typeAdjectives = {
                WEAPON: '武器',
                ARMOR: '护甲',
                TOOL: '工具',
                TOY: '玩具'
            };

            const suffixes = [
                '散发着神秘的光芒。',
                '蕴含着强大的魔力。',
                '是工匠心血的结晶。',
                '拥有不可思议的力量。',
                '闪耀着迷人的光彩。'
            ];

            let desc = `${qualityAdjectives[qualityLevel]}${typeAdjectives[itemType]}"${itemName}"`;
            if (requestNote) {
                desc += `（${requestNote}）`;
            }
            desc += `${suffixes[Math.floor(Math.random() * suffixes.length)]}`;

            return desc;
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function renderTaskList() {
            const taskList = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <div>📭</div>
                        <p>暂无任务</p>
                        <p style="font-size: 0.8rem;">创建一个任务开始吧！</p>
                    </div>
                `;
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <div class="task-item" onclick="showItem(${task.id})">
                    <h3>${task.itemName} ${typeIcons[task.itemType]}</h3>
                    <div class="meta">
                        <span>${typeDescriptions[task.itemType]}</span>
                        <span>材料: ${'⭐'.repeat(task.materialLevel)}</span>
                    </div>
                    <span class="status ${task.status.toLowerCase()}">${getStatusText(task.status)}</span>
                    ${task.qualityLevel ? `
                        <div style="margin-top: 10px;">
                            <span class="quality ${task.qualityLevel.toLowerCase()}">${qualityDescriptions[task.qualityLevel]}</span>
                        </div>
                    ` : ''}
                    ${task.resultDescription ? `
                        <div class="result-description">${task.resultDescription}</div>
                    ` : ''}
                </div>
            `).join('');
        }

        function getStatusText(status) {
            const texts = {
                PENDING: '等待中',
                PROCESSING: '制作中',
                SUCCEEDED: '完成',
                FAILED: '失败'
            };
            return texts[status];
        }

        function showItem(taskOrId) {
            const task = typeof taskOrId === 'number' 
                ? tasks.find(t => t.id === taskOrId) 
                : taskOrId;

            if (!task) return;

            const showcase = document.getElementById('itemShowcase');

            if (task.status !== 'SUCCEEDED') {
                showcase.innerHTML = `
                    <div class="loading">道具制作中，请稍候...</div>
                `;
                return;
            }

            showcase.innerHTML = `
                <div class="item-showcase">
                    <div class="item-icon" style="color: ${qualityColors[task.qualityLevel]}">
                        ${typeIcons[task.itemType]}
                    </div>
                    <h2 style="margin-bottom: 10px;">${task.itemName}</h2>
                    <span class="quality ${task.qualityLevel.toLowerCase()}">${qualityDescriptions[task.qualityLevel]}</span>
                    <div class="item-details">
                        <div class="stat-row">
                            <span class="stat-label">类型</span>
                            <span class="stat-value">${typeDescriptions[task.itemType]}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">材料等级</span>
                            <span class="stat-value">${'⭐'.repeat(task.materialLevel)}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">品质</span>
                            <span class="stat-value">${qualityDescriptions[task.qualityLevel]}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">制作时间</span>
                            <span class="stat-value">${formatDate(task.createdAt)}</span>
                        </div>
                    </div>
                    <div class="result-description" style="margin-top: 20px;">
                        ${task.resultDescription}
                    </div>
                </div>
            `;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
    </script>
</body>
</html>
